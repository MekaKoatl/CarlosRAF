<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3</title>
  </head>
  <body>
    <ul id="show"></ul>

    <script>
      let num = 0;
      let list = "";

      while (num <= 100) {
        if (num % 5 !== 0) {
          list += `<li>${num}</li><br>`;
        }
        num++;
      }
      document.getElementById("show").innerHTML = list;
    </script>
  </body>
</html>
