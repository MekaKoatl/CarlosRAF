<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>6</title>
</head>
<body>

  <h2>Calculadora</h2>

  <label>¿Qué operación deseas realizar?</label><br><br>
  <select id="operacion">
    <option value="suma">Suma</option>
    <option value="resta">Resta</option>
    <option value="multiplicacion">Multiplicación</option>
    <option value="division">División</option>
    <option value="resto">Resto</option>
  </select>

  <br><br>

  <label>Número A: <input type="number" id="numA"></label><br><br>
  <label>Número B: <input type="number" id="numB"></label><br><br>

  <button onclick="calcular()">Calcular</button>

  <br><br>

  <div id="resultado"></div>

  <script>
    function calcular() {
      const a = parseFloat(document.getElementById('numA').value);
      const b = parseFloat(document.getElementById('numB').value);
      const calc= document.getElementById('operacion').value;

     

      let simbolo, resultado, estilo;

      if (calc=== 'suma') {
        simbolo  = '+';
        resultado = a + b;
      } else if (calc=== 'resta') {
        simbolo  = '-';
        resultado = a - b;
      } else if (calc=== 'multiplicacion') {
        simbolo  = '×';
        resultado = a * b;
      } else if (calc=== 'division') {
        simbolo  = '÷';
        resultado = a / b;
      } else if (calc=== 'resto') {
        simbolo  = '%';
        resultado = a % b;
      }

      document.getElementById('resultado').innerHTML = `
        <p>
          ${a} ${simbolo} ${b} = <strong>${resultado}</strong>
        </p>
      `;
    }
  </script>

</body>
</html>
